<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RL Bot Charts</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style> body { margin:0; background:#0f1724; color:#fff } #chart { width: 100%; height: 600px; }</style>
</head>
<body>
  <div id="chart"></div>
  <script>
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
      layout: { backgroundColor: '#0f1724', textColor: '#d1d5db' },
      rightPriceScale: { borderColor: '#334155' },
      timeScale: { borderColor: '#334155' }
    });

    const candleSeries = chart.addCandlestickSeries();
    const volumeSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, scaleMargins: { top: 0.8, bottom: 0 }});

    const ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'candle') {
          // convert unix sec -> unix sec (lightweight-charts uses seconds)
          const point = { time: msg.time, open: msg.open, high: msg.high, low: msg.low, close: msg.close };
          candleSeries.update(point);
          volumeSeries.update({ time: msg.time, value: msg.volume });
        } else if (msg.type === 'trade') {
          // optional: show markers
        }
      } catch(err) {
        console.error('parse', err);
      }
    };
  </script>
</body>
</html>
